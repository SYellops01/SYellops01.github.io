# ------------------------------------------------------------------
# Site plumbing — no need to touch this
# ------------------------------------------------------------------
collections:
  client_projects:
    output: true
    permalink: /client-projects/:slug/
  personal_projects:
    output: true
    permalink: /personal-projects/:slug/

defaults:
  - scope:
      path: ""
      type: "client_projects"
    values:
      layout: "client_project"

  - scope:
      path: ""
      type: "personal_projects"
    values:
      layout: "project"

  - scope:
      path: ""
    values:
      layout: "default"

markdown: kramdown
sass:
  style: compressed

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
